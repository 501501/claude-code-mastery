<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 버킷 리스트</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen py-12">
    <div class="container mx-auto px-4 max-w-4xl">
        <!-- 헤더 -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold text-white mb-3 drop-shadow-lg">🎯 나의 버킷 리스트</h1>
            <p class="text-white text-lg opacity-90 drop-shadow-md">인생에서 꼭 이루고 싶은 것들을 기록하세요</p>
        </header>

        <!-- 통계 -->
        <div class="bg-white bg-opacity-10 backdrop-blur-md rounded-xl shadow-lg p-8 mb-8 border border-white border-opacity-20">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="text-center">
                    <p class="text-4xl font-bold text-white mb-2" id="totalCount">0</p>
                    <p class="text-white text-opacity-80 text-sm font-medium">전체</p>
                </div>
                <div class="text-center">
                    <p class="text-4xl font-bold text-green-300 mb-2" id="completedCount">0</p>
                    <p class="text-white text-opacity-80 text-sm font-medium">완료</p>
                </div>
                <div class="text-center">
                    <p class="text-4xl font-bold text-orange-300 mb-2" id="progressCount">0</p>
                    <p class="text-white text-opacity-80 text-sm font-medium">진행중</p>
                </div>
                <div class="text-center">
                    <p class="text-4xl font-bold text-purple-300 mb-2" id="completionRate">0%</p>
                    <p class="text-white text-opacity-80 text-sm font-medium">달성률</p>
                </div>
            </div>
        </div>

        <!-- 입력 폼 -->
        <div class="bg-white bg-opacity-95 rounded-xl shadow-xl p-7 mb-8 backdrop-blur-sm">
            <form id="bucketForm" class="flex gap-3">
                <input
                    type="text"
                    id="bucketInput"
                    placeholder="새로운 버킷 리스트를 입력하세요..."
                    class="flex-1 px-5 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-800 placeholder-gray-400"
                    required
                >
                <button
                    type="submit"
                    class="px-7 py-3 text-white rounded-lg font-semibold transition-all duration-300 hover:shadow-lg active:scale-95"
                >
                    추가
                </button>
            </form>
        </div>

        <!-- 필터 -->
        <div class="bg-white bg-opacity-95 rounded-xl shadow-lg p-6 mb-8 backdrop-blur-sm">
            <div class="flex gap-3 justify-center flex-wrap">
                <button
                    class="filter-btn px-7 py-3 rounded-lg font-semibold transition-all duration-300 active"
                    data-filter="all"
                >
                    전체
                </button>
                <button
                    class="filter-btn px-7 py-3 rounded-lg font-semibold transition-all duration-300"
                    data-filter="active"
                >
                    진행중
                </button>
                <button
                    class="filter-btn px-7 py-3 rounded-lg font-semibold transition-all duration-300"
                    data-filter="completed"
                >
                    완료
                </button>
            </div>
        </div>

        <!-- 버킷 리스트 목록 -->
        <div id="bucketListContainer" class="space-y-4">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- 빈 상태 메시지 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <p class="text-white text-opacity-80 text-xl mb-2">아직 버킷 리스트가 없습니다.</p>
            <p class="text-white text-opacity-70">위에서 새로운 목표를 추가해보세요!</p>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="fixed inset-0 hidden items-center justify-center z-50">
        <div class="rounded-2xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold mb-6 text-gray-800">버킷 리스트 수정</h3>
            <form id="editForm">
                <input
                    type="text"
                    id="editInput"
                    class="w-full px-5 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent mb-6 text-gray-800"
                    required
                >
                <div class="flex gap-3 justify-end">
                    <button
                        type="button"
                        id="cancelEdit"
                        class="px-6 py-2 bg-gray-100 text-gray-800 rounded-lg font-medium hover:bg-gray-200 transition-all duration-300"
                    >
                        취소
                    </button>
                    <button
                        type="submit"
                        class="px-6 py-2 text-white rounded-lg font-semibold transition-all duration-300"
                    >
                        저장
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
