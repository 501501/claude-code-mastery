<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 320px;
        }

        .display {
            background: #222;
            color: #fff;
            font-size: 32px;
            padding: 20px;
            border-radius: 12px;
            text-align: right;
            margin-bottom: 20px;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 80px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            background: #f0f0f0;
            color: #333;
        }

        button:active {
            transform: scale(0.95);
        }

        button.operator {
            background: #667eea;
            color: white;
        }

        button.operator:hover {
            background: #5568d3;
        }

        button.equals {
            background: #48bb78;
            color: white;
            grid-column: span 2;
        }

        button.equals:hover {
            background: #38a169;
        }

        button.clear {
            background: #ff6b6b;
            color: white;
            grid-column: span 2;
        }

        button.clear:hover {
            background: #ff5252;
        }

        button:hover {
            background: #e0e0e0;
        }

        .number-btn {
            background: #f9f9f9;
        }

        .number-btn:hover {
            background: #efefef;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button class="number-btn" onclick="appendNumber('7')">7</button>
            <button class="number-btn" onclick="appendNumber('8')">8</button>
            <button class="number-btn" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button class="number-btn" onclick="appendNumber('4')">4</button>
            <button class="number-btn" onclick="appendNumber('5')">5</button>
            <button class="number-btn" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="number-btn" onclick="appendNumber('1')">1</button>
            <button class="number-btn" onclick="appendNumber('2')">2</button>
            <button class="number-btn" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="toggleNegative()">±</button>

            <button class="number-btn" onclick="appendNumber('0')">0</button>
            <button class="number-btn" onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentValue;
        }

        function appendNumber(num) {
            // TODO(human): 숫자 입력 로직을 완성하세요
            // 현재 디스플레이에 숫자를 추가하는 기능을 구현해야 합니다.
            // 다음을 고려하세요:
            // 1. 디스플레이가 '0'이면 새 숫자로 교체
            // 2. 소수점은 한 번만 추가
            // 3. shouldResetDisplay가 true면 새로 시작
        }

        function appendOperator(op) {
            if (operator !== null && !shouldResetDisplay) {
                calculate();
            }
            previousValue = currentValue;
            operator = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === null || previousValue === '') return;

            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);
            let result;

            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = current !== 0 ? prev / current : 0;
                    break;
                default:
                    return;
            }

            currentValue = result.toString();
            operator = null;
            previousValue = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearDisplay() {
            currentValue = '0';
            previousValue = '';
            operator = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function toggleNegative() {
            const num = parseFloat(currentValue);
            currentValue = (num * -1).toString();
            updateDisplay();
        }
    </script>
</body>
</html>
